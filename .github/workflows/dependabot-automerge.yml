name: Automerge Dependabot PRs

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Automerge Dependabot PRs
        uses: navikt/automerge-dependabot@70455df4433fac78f20d5a248f9ebf07ccac11fe # v1.5
        with:
          token: ${{ github.token }}
          blackout-periods: '2025-07-01/2025-07-31,2025-12-20/2026-01-02'
