apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: tpt-data-collector
  namespace: appsec
spec:
  ingresses:
    - https://tpt-data-collector.nav.no
  image: {{image}}
  port: 8080
  accessPolicy:
    outbound:
      external:
        - host: github.com
      rules:
        - application: neo4j
    inbound:
      rules:
        - application: tpt-backend
  liveness:
    path: /internal/isAlive
  readiness:
    path: /internal/isReady
  replicas:
    max: 1
    min: 1
  kafka:
    pool: nav-prod
  resources:
    requests:
      cpu: 20m
      memory: 256Mi
  observability:
    logging:
      destinations:
        - id: loki
  prometheus:
    enabled: true
    path: /internal/metrics
  env:
    - name: TPT_TOPIC
      value: appsec.tpt
    - name: KAFKA_CLIENT_ID
      value: tpt-data-collector
  envFrom:
    - secret: tpt-data-collector
    - secret: tpt-graph
  azure:
    application:
      enabled: true
